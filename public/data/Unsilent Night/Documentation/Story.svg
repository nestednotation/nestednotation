<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="100%" height="100%" viewBox="0 0 1062 1540" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">
    <rect id="Story" x="0.736" y="0.107" width="1060.8" height="1539.39" style="fill:none;"/>
    <g id="sounders-OUT-votemarker" serif:id="sounders OUT votemarker">
        <g transform="matrix(1,0,0,1,3.61888,-5451.33)">
            <text x="70.42px" y="5674.36px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:30px;">Unsilent Night</text>
            <text x="282.075px" y="5674.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">is an original composition by Phil Kline, written</text>
            <g transform="matrix(30,0,0,30,140.454,5714.36)">
            </g>
            <g transform="matrix(30,0,0,30,148.789,5714.36)">
            </g>
            <text x="70.42px" y="5714.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">speciﬁcally to be heard outdoors in the month of December<tspan x="852.529px 860.864px " y="5714.36px 5714.36px ">. </tspan>It takes</text>
            <text x="70.42px" y="5754.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">the form of a street promenade in which the audience becomes the</text>
            <text x="70.42px" y="5794.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">performer<tspan x="198.799px 207.134px " y="5794.36px 5794.36px ">. </tspan>Each participant gets one of four tracks of music in the</text>
            <text x="70.42px" y="5834.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">form of a cassette, CD, or Mp3. <tspan x="495.02px 510.02px 526.704px " y="5834.36px 5834.36px 5834.36px ">Tog</tspan>ether all four tracks comprise</text>
            <text x="70.42px" y="5874.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">Unsilent Night. <tspan x="273.301px 291.626px " y="5874.36px 5874.36px ">Th</tspan>e fact that the participants play dif<tspan x="754.692px 763.027px " y="5874.36px 5874.36px ">fe</tspan>rent &quot;parts&quot;</text>
            <text x="70.42px" y="5914.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">simultaneously helps create the special sound of the piece.</text>
            <g transform="matrix(30,0,0,30,769.092,5954.36)">
            </g>
            <g transform="matrix(30,0,0,30,777.427,5954.36)">
            </g>
            <text x="70.42px" y="5954.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">Participants carry boomboxes, or anything that ampliﬁes music, and</text>
            <text x="70.42px" y="5994.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">simultaneously start playing the music. <tspan x="591.773px 610.098px " y="5994.36px 5994.36px ">Th</tspan>ey then walk a carefully</text>
            <text x="70.42px" y="6034.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">chosen route through their city’<tspan x="480.108px 495.108px " y="6034.36px 6034.36px ">s </tspan>streets, creating a unique mobile</text>
            <text x="70.42px" y="6074.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">sound sculpture which is dif<tspan x="436.733px 445.068px " y="6074.36px 6074.36px ">fe</tspan>rent from every listener&apos;s perspective.</text>
            <text x="70.42px" y="6138.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">It all started in winter 1992, when Phil had an idea for a public</text>
            <text x="70.42px" y="6178.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">artwork in the form of a holiday caroling party<tspan x="666.802px 675.137px " y="6178.36px 6178.36px ">. </tspan> He composed a multi-</text>
            <text x="70.42px" y="6218.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">track electronic piece that was 45 minutes long (the length of one</text>
            <text x="70.42px" y="6258.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">side of a cassette tape), invited a few dozen friends who gathered in</text>
            <text x="70.42px" y="6298.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">Greenwich V<tspan x="241.616px 248.281px " y="6298.36px 6298.36px ">il</tspan>lage, gave each person a boombox with one of four</text>
            <text x="70.42px" y="6338.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">tapes in it, and instructed everyone to hit PLA<tspan x="671.885px 691.353px 699.688px " y="6338.36px 6338.36px 6338.36px ">Y a</tspan>t the same time.</text>
            <text x="70.42px" y="6378.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">What followed was a sound unlike anything they had ever heard</text>
            <g transform="matrix(30,0,0,30,398.984,6418.36)">
            </g>
            <g transform="matrix(30,0,0,30,407.319,6418.36)">
            </g>
            <text x="70.42px" y="6418.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">before: an evanescence ﬁlling the air<tspan x="557.407px 565.742px " y="6418.36px 6418.36px ">, </tspan>reverberating of<tspan x="783.652px 791.987px " y="6418.36px 6418.36px ">f </tspan>the buildings</text>
            <text x="70.42px" y="6458.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">and city streets as the crowd walked a pre-determined route. Phil</text>
            <text x="70.42px" y="6498.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">says: “In ef<tspan x="216.597px 224.932px " y="6498.36px 6498.36px ">fe</tspan>ct, we became a city-block-long stereo system.”</text>
            <text x="70.42px" y="6562.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">The piece was so popular that it became an annual tradition, and</text>
            <text x="70.42px" y="6602.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">then an international phenomenon, spreading across the USA<tspan x="889.312px 897.647px " y="6602.36px 6602.36px "> a</tspan>nd to</text>
            <text x="70.42px" y="6642.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">other countries worldwide. Since 1992, it has been presented in 175</text>
            <g transform="matrix(30,0,0,30,205.493,6682.36)">
            </g>
            <g transform="matrix(30,0,0,30,213.828,6682.36)">
            </g>
            <g transform="matrix(30,0,0,30,869.214,6682.36)">
            </g>
            <text x="70.42px" y="6682.36px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:30px;">cities and ﬁve continents, drawing thousands of participants.</text>
        </g>
    </g>
    <g>
        <g transform="matrix(1,0,0,1,-3.76991,-874.265)">
            <text x="241.094px" y="986.402px" style="font-family:'Impact', sans-serif;font-stretch:condensed;font-size:96px;fill:#82c072;">UNSILENT</text>
            <g transform="matrix(96,0,0,96,825.625,986.402)">
            </g>
            <text x="595.516px" y="986.402px" style="font-family:'Impact', sans-serif;font-stretch:condensed;font-size:96px;">NIGHT</text>
        </g>
    </g>
    <a href="Notes.svg">
    <g id="NOTES-FOR-MUSICIANS" serif:id="NOTES FOR MUSICIANS">
        <path d="M801.136,1375.04L801.136,1471.91C801.136,1478.75 795.59,1484.29 788.758,1484.29L273.515,1484.29C266.683,1484.29 261.136,1478.75 261.136,1471.91L261.136,1375.04C261.136,1368.21 266.683,1362.67 273.515,1362.67L788.758,1362.67C795.59,1362.67 801.136,1368.21 801.136,1375.04Z" style="fill:#82c072;stroke:#82c072;stroke-width:4px;"/>
        <g transform="matrix(1,0,0,1,40.4479,428.522)">
            <text x="245.913px" y="986.402px" style="font-family:'Impact', sans-serif;font-stretch:condensed;font-size:60px;">notes for musicians</text>
            <g transform="matrix(60,0,0,60,693.686,1046.4)">
            </g>
            <text x="286.284px" y="1046.4px" style="font-family:'Impact', sans-serif;font-stretch:condensed;font-size:60px;">and par<tspan x="473.579px 491.86px " y="1046.4px 1046.4px ">ti</tspan>cipants</text>
        </g>
    </g>
    </a>
</svg>
