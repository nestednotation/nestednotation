<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="100%" height="100%" viewBox="0 0 1062 1542" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">
    <rect id="Notes" x="0.244" y="0.107" width="1060.8" height="1541.34" style="fill:none;"/>
    <g id="sounders-OUT-votemarker" serif:id="sounders OUT votemarker">
    </g>
    <g>
        <g transform="matrix(1,0,0,1,-4.26248,-874.265)">
            <text x="241.094px" y="986.402px" style="font-family:'Impact', sans-serif;font-stretch:condensed;font-size:96px;fill:#82c072;">UNSILENT</text>
            <g transform="matrix(96,0,0,96,825.625,986.402)">
            </g>
            <text x="595.516px" y="986.402px" style="font-family:'Impact', sans-serif;font-stretch:condensed;font-size:96px;">NIGHT</text>
        </g>
    </g>
    <g transform="matrix(1,0,0,1,3.12631,-5519.81)">
        <text x="70.42px" y="5671.49px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:26px;">Overview</text>
        <text x="70.42px" y="5722.34px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">This special excerpt and arrangement of Unsilent Night includes written</text>
        <text x="70.42px" y="5749.19px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">melodic &quot;cells&quot; which match the original music. <tspan x="612.942px 628.823px " y="5749.19px 5749.19px ">Th</tspan>e four Bells at the side of the</text>
        <text x="70.42px" y="5776.04px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">screen match the original cassette music at those cells. If there are fewer than</text>
        <text x="70.42px" y="5802.89px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">four distinct parts in any section of the piece, those bells will be grouped</text>
        <text x="70.42px" y="5829.74px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">together<tspan x="164.391px " y="5829.74px ">.</tspan></text>
        <text x="70.42px" y="5880.59px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:26px;">Enjoying as a Participant</text>
        <text x="70.42px" y="5931.44px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">As long as your device screen is on, you will remain synced with everyone. <tspan x="937.027px 951.983px 966.442px " y="5931.44px 5931.44px 5931.44px ">You</tspan></text>
        <text x="70.42px" y="5958.29px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">need not do anything but turn up your volume. If you wish to move the piece</text>
        <text x="70.42px" y="5985.14px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">along, you may do so in guide mode. <tspan x="501.147px 518.488px " y="5985.14px 5985.14px ">Al</tspan>ternately<tspan x="622.057px 629.28px " y="5985.14px 5985.14px ">, </tspan>you may also vote to stay if</text>
        <text x="70.42px" y="6011.99px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">you don&apos;t wish the piece to progress so quickly<tspan x="603.852px " y="6011.99px ">.</tspan></text>
        <text x="70.42px" y="6062.84px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">By all means, please sing along, whatever you hear or see, whenever you like!</text>
        <text x="70.42px" y="6113.69px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:26px;">Musicians: Feeling the Pulse</text>
        <text x="70.42px" y="6164.54px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">This section of Unsilent Night is in a fast, complex meter<tspan x="714.91px 722.134px " y="6164.54px 6164.54px ">, </tspan>with both a &quot;three-</text>
        <text x="70.42px" y="6191.4px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">feel&quot; and a &quot;four-feel&quot;. It may be prudent to spend a moment bobbing your head</text>
        <text x="70.42px" y="6218.24px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">and tapping your feet with the music before launching in with your instrument.</text>
        <text x="70.42px" y="6269.1px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:26px;">Musicians: Finding the &quot;1&quot;</text>
        <text x="70.42px" y="6319.95px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">Like the original Unsilent Night, this version is asynchronous. People will feel</text>
        <text x="70.42px" y="6346.8px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">the beat in dif<tspan x="226.065px 233.288px " y="6346.8px 6346.8px ">fe</tspan>rent places. <tspan x="388.907px 404.789px " y="6346.8px 6346.8px ">Th</tspan>ere is no right or wrong &quot;beat one&quot;. If you feel the</text>
        <text x="70.42px" y="6373.65px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">beat in a certain way<tspan x="306.959px 314.183px " y="6373.65px 6373.65px ">, </tspan>that&apos;s the way to play it. <tspan x="597.593px 613.475px " y="6373.65px 6373.65px ">Th</tspan>erefore, although the four</text>
        <text x="70.42px" y="6400.5px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">written staves</text>
        <text x="236.589px" y="6400.5px" style="font-family:'Arial-ItalicMT', 'Arial', sans-serif;font-style:italic;font-size:26px;">appear</text>
        <text x="324.771px" y="6400.5px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">to be synchronized, they are not. Do not expect to &quot;line</text>
        <text x="70.42px" y="6427.35px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">up&quot; with the other parts, unless you engineer it for yourself.</text>
        <text x="70.42px" y="6478.2px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:26px;">Musicians: Changing Which Line <tspan x="484.516px 499.928px 515.81px " y="6478.2px 6478.2px 6478.2px ">You</tspan>&apos;re Playing</text>
        <text x="70.42px" y="6529.05px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">Please feel free to switch between lines at any time. <tspan x="674.044px 689.926px " y="6529.05px 6529.05px ">Th</tspan>ere is no &quot;assigned&quot; line</text>
        <text x="70.42px" y="6555.9px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">to your instrument, just because a clef is more or less commonly experienced.</text>
        <text x="70.42px" y="6582.75px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">That said, please remember the note about</text>
        <text x="574.83px" y="6582.75px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:26px;">feeling the pulse</text>
        <text x="779.974px" y="6582.75px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">. When moving to</text>
        <text x="70.42px" y="6609.6px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">new material, don&apos;t worry about dropping out and just tapping your feet, or</text>
        <text x="70.42px" y="6636.45px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">humming the new line you want to play<tspan x="516.521px 523.744px 530.498px 546.38px " y="6636.45px 6636.45px 6636.45px 6636.45px ">. Th</tspan>ere&apos;s no requirement to keep sound</text>
        <text x="70.42px" y="6663.3px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">going all the time.</text>
        <text x="70.42px" y="6714.15px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:26px;">Musicians: Playing W<tspan x="336.019px 343.242px " y="6714.15px 6714.15px ">it</tspan>h Others</text>
        <text x="70.42px" y="6765px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">Other musicians will react to how and what you play<tspan x="665.322px 672.546px " y="6765px 6765px ">, </tspan>just as you will react to</text>
        <text x="70.42px" y="6791.85px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">how and what they play<tspan x="340.221px 347.444px " y="6791.85px 6791.85px ">, </tspan>if you&apos;re listening. Feel free to just accept and surf the</text>
        <text x="70.42px" y="6818.7px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">vibe, or make explicit decisions based on things you notice or like. Feel free to</text>
        <g transform="matrix(26,0,0,26,388.361,6845.56)">
        </g>
        <g transform="matrix(26,0,0,26,395.585,6845.56)">
        </g>
        <text x="70.42px" y="6845.56px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">copy others, play the same ﬁgure at dif<tspan x="516.521px 523.744px " y="6845.56px 6845.56px ">fe</tspan>rent times (a canon) or shift to or away</text>
        <text x="70.42px" y="6872.41px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:26px;">from certain lines based on what other musicians do. <tspan x="683.185px 700.526px " y="6872.41px 6872.41px ">An</tspan>d above all, have fun!</text>
    </g>
