    <g transform="matrix(1,0,0,1,-4285.37,66.4979)">
        <text x="4489px" y="338px" style="font-family:'MetallophileSp8-Medium', 'Metallophile Sp8';font-weight:500;font-size:40px;">The dots in the ring represent musical notes.</text>
        <text x="4489px" y="418px" style="font-family:'MetallophileSp8-Medium', 'Metallophile Sp8';font-weight:500;font-size:40px;">In play mode, touching dots will cause those notes to play<tspan x="5398.2px " y="418px ">.</tspan></text>
        <text x="4489px" y="498px" style="font-family:'MetallophileSp8-Medium', 'Metallophile Sp8';font-weight:500;font-size:40px;">The dots and ring together represent a frame, or section of music.</text>
        <g transform="matrix(40,0,0,40,5848.2,578)">
        </g>
        <text x="4489px" y="578px" style="font-family:'MetallophileSp8-Medium', 'Metallophile Sp8';font-weight:500;font-size:40px;">In guide mode, touching the dots or ring can move the whole group to the next frame.</text>
    </g>
