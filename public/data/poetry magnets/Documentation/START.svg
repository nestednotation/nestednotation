<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="100%" height="100%" viewBox="0 0 1040 1631" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
    <rect id="Documentation-START" serif:id="Documentation START" x="0" y="0.618" width="1040" height="1630" style="fill:none;"/>
    <g id="poetry-magnets" serif:id="poetry magnets">
        <g transform="matrix(53.3333,0,0,53.3333,746.587,87.1642)">
        </g>
        <text x="298.515px" y="87.164px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:53.333px;">poetry magnets</text>
    </g>
    <g id="poetry-magnets1" serif:id="poetry magnets">
    </g>
    <g transform="matrix(1,0,0,1,9.89717,-2185.09)">
        <text x="58.594px" y="2534.72px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">Minneapolis, 1993: Dave Kapell, songwriter, is</text>
        <text x="58.594px" y="2561.38px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">struggling with writer&apos;s block. He creates a set of</text>
        <text x="58.594px" y="2588.05px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">magnetic-backed words and puts them on his fridge to</text>
        <text x="58.594px" y="2614.72px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">help with song ideas.</text>
        <text x="58.594px" y="2668.05px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">As visiting friends rearrange the words, it becomes</text>
        <text x="58.594px" y="2694.72px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">clear that Dave has a product on his hands. He makes an</text>
        <text x="58.594px" y="2721.38px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">initial run of 100 kits, sets up shop in Uptown, and</text>
        <text x="58.594px" y="2748.05px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">sells out in three hours.</text>
        <text x="58.594px" y="2801.38px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">This basic, nounless digital poetry magnet kit falls</text>
        <text x="58.594px" y="2828.05px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">short of the linguistic grandeur of the original,</text>
        <text x="58.594px" y="2854.72px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">however the challenge remains: can you say something you</text>
        <text x="58.594px" y="2881.38px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">like with what is at hand?</text>
        <g transform="matrix(26.6667,0,0,26.6667,554.674,3041.38)">
        </g>
        <text x="58.594px" y="3041.38px" style="font-family:'CourierNewPS-BoldMT', 'Courier New', monospace;font-weight:700;font-size:26.667px;">Voice performed by Noelle Jones</text>
    </g>
</svg>
